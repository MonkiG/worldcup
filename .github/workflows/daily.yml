name: Refresh World Cup bracket

on:
  schedule:
    - cron: "15 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            scraper/package-lock.json
      - id: chrome
        uses: browser-actions/setup-chrome@v1
      - name: Install dependencies
        run: |
          npm ci --prefix web
          npm ci --prefix scraper
      - name: Scrape standings and project bracket
        run: npm --prefix scraper run scrape -- --target groups
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
      - name: Commit changed data
        run: |
          if git diff --quiet -- data/latest.json; then
            echo "No standings changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json
          git commit -m "Update World Cup standings and bracket"
          git push
